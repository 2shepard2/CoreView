name: coreview

services:
  coreview:
    container_name: coreview
    init: true
    build:
      context: ./server
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${HOST_PORT:-3210}:3210"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3210/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
