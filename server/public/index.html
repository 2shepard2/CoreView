      const camera = [item.make, item.model].filter(Boolean).join(" ");
      if (camera) {
        parts.push(camera.trim());
      }
      frameMetaEl.textContent = parts.join(" | ");
    }

    function showNextFrameImage() {
      const nextIndex = chooseNextFrameIndex();
      if (nextIndex === null) {
        frameMetaEl.textContent = "No compatible images for this display";
        frameImageEl.removeAttribute("src");
        return;
      }
      showFrameImage(nextIndex);
    }

    async function loadImmichFrame(albumId, interval) {
      state.frameInterval = Math.max(5, Number(interval || 20));
      const url = withMediaAuth(albumId ? `/api/immich/album/${encodeURIComponent(albumId)}/assets` : "/api/immich/album/default/assets");
      try {
        const rsp = await fetchWithMediaRetry(url, { cache: "no-store" });
        if (!rsp.ok) {
          throw new Error(`Album request failed (${rsp.status})`);
        }
        const data = await rsp.json();
        state.frameAssets = (Array.isArray(data.assets) ? data.assets : []).filter((asset) => String(asset.type || "").toUpperCase() === "IMAGE");
        state.frameIndex = -1;
        state.frameFailedIds.clear();
        showNextFrameImage();
        if (state.frameTimer) {
          clearInterval(state.frameTimer);
        }
        state.frameTimer = setInterval(showNextFrameImage, state.frameInterval * 1000);
      } catch (err) {
        frameMetaEl.textContent = `Immich error: ${err.message || "unknown error"}`;
      }
    }

    frameImageEl.addEventListener("error", () => {
      const item = state.frameAssets[state.frameIndex];
      if (item) {
        if (!item.__authRetryAttempted) {
          item.__authRetryAttempted = true;
          requestMediaTokenRefresh();
          setTimeout(() => {
            if (state.currentTemplate === "photo_slideshow") {
              frameImageEl.src = withMediaAuth(item.url);
            }
          }, 320);
          return;
        }
      }
      if (item && item.id) {
        state.frameFailedIds.add(item.id);
      }
      if (state.frameFailedIds.size >= state.frameAssets.length) {
        frameMetaEl.textContent = "No compatible images for this display";
        frameImageEl.removeAttribute("src");
        return;
      }
      showNextFrameImage();
    });

    overlayImageEl.addEventListener("error", () => {
      if (!state.overlaySnapshotUrl) {
        return;
      }
      if (!state.overlayAuthRetried) {
        state.overlayAuthRetried = true;
        requestMediaTokenRefresh();
        setTimeout(() => {
          if (overlayEl.classList.contains("active") && state.overlaySnapshotUrl) {
            overlayImageEl.src = withMediaAuth(state.overlaySnapshotUrl);
          }
        }, 320);
        return;
      }
      overlayImageEl.style.display = "none";
    });

    function renderTicker(payload) {
      const speed = Math.max(20, Number(payload.speed || state.tickerSpeed || 45));
      state.tickerSpeed = speed;
      clearElement(tickerTrackEl);

      const fragment = document.createDocumentFragment();
      const appendTickerContent = () => {
        if (Array.isArray(payload.groups) && payload.groups.length > 0) {
          payload.groups.forEach((group, index) => {
            if (index > 0) {
              appendTickerSeparator(fragment);
            }
            const items = Array.isArray(group.items) ? group.items : [group.items || ""];
            appendTickerItem(fragment, {
              label: `[${String(group.label || "INFO")}] `,
              level: String(group.level || "ok").toLowerCase(),
              text: items.filter((item) => String(item || "").trim()).join(" | ")
            });
          });
          return;
        }
        if (payload.message) {
          appendTickerItem(fragment, { text: String(payload.message) });
          return;
        }
        appendTickerItem(fragment, { text: "No ticker data" });
      };

      appendTickerContent();
      appendTickerSeparator(fragment);
      appendTickerContent();
      tickerTrackEl.appendChild(fragment);

      // Approximate runtime for smooth scroll based on text length and configured speed.
      const approxPixels = Math.max(1200, tickerTrackEl.textContent.length * 8);
      const seconds = Math.max(18, Math.round(approxPixels / speed));
      tickerTrackEl.style.setProperty("--ticker-duration", `${seconds}s`);
      tickerEl.classList.add("active");
    }

    if (state.viewMode && state.viewId) {
      setAssignedScreenId(`view:${state.viewId}`, `View ${state.viewId}`);
      provisioningEl.classList.remove("active");
      provisionMetaEl.textContent = "Published view mode";
    }
    applyTitle(state.defaultTitle);
    rebuildAcceptedTargets();
    if (!state.viewMode) {
      provisioningEl.classList.toggle("active", !effectiveScreenId());
    }
    applyTheme();
    syncStatusBadgePosition();
    updateClock();
    setInterval(updateClock, 1000);

    function sendClientStatus() {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        return;
      }
      state.ws.send(JSON.stringify({
        type: "client_status",
        target: effectiveScreenId(),
        deviceId: state.deviceId,
        deviceKey: state.deviceKey,
        userAgent: navigator.userAgent
      }));
    }

    function stopHeartbeat() {
      if (state.heartbeatTimer) {
        clearInterval(state.heartbeatTimer);
        state.heartbeatTimer = null;
      }
    }

    function startHeartbeat() {
      stopHeartbeat();
      sendClientStatus();
      state.heartbeatTimer = setInterval(sendClientStatus, 15000);
    }

    async function fetchViewRuntime() {
      if (!state.viewMode || !state.viewId) {
        return;
      }
      const token = String(state.viewToken || "").trim();
      if (!token) {
        statusEl.textContent = "View token missing";
        return;
      }
      const url = `/api/views/${encodeURIComponent(state.viewId)}/runtime?vt=${encodeURIComponent(token)}`;
      try {
        const response = await fetch(url, { cache: "no-store" });
        if (response.status === 401) {
          statusEl.textContent = "View auth failed";
          return;
        }
        if (!response.ok) {
          statusEl.textContent = "View unavailable";
          return;
        }
        const data = await response.json();
        if (data.mediaToken) {
          setMediaToken(data.mediaToken);
        }
        setAssignedScreenId(data.mediaScope || `view:${state.viewId}`, data.runtime?.view?.name || `View ${state.viewId}`);
        provisioningEl.classList.remove("active");
        applyRuntime(data.runtime || null);
        statusEl.textContent = "Connected";
      } catch (_err) {
        statusEl.textContent = "Disconnected";
      }
    }

    function startViewRuntimePolling() {
      if (!state.viewMode) {
        return;
      }
      if (state.viewRefreshTimer) {
        clearInterval(state.viewRefreshTimer);
      }
      fetchViewRuntime();
      state.viewRefreshTimer = setInterval(fetchViewRuntime, 15000);
    }

    function connectWs() {
      const wsProto = window.location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${wsProto}://${window.location.host}/ws`);
      state.ws = ws;

      ws.addEventListener("open", () => {
        statusEl.textContent = "Connected";
        startHeartbeat();
      });

      ws.addEventListener("close", () => {
        statusEl.textContent = "Disconnected";
        stopHeartbeat();
        if (state.wsReconnectTimer) {
          clearTimeout(state.wsReconnectTimer);
        }
        state.wsReconnectTimer = setTimeout(connectWs, 2000);
      });

      ws.addEventListener("message", (event) => {
      const data = JSON.parse(event.data);
      if (data.type === "hello") {
        if (data.mediaToken) {
          setMediaToken(data.mediaToken);
        }
        return;
      }
      if (data.type === "provisioning") {
        if (data.mediaToken) {
          setMediaToken(data.mediaToken);
        }
        if (data.registered && data.screenId) {
          setAssignedScreenId(data.screenId, data.runtime?.screen?.friendlyName || "");
          provisioningEl.classList.remove("active");
          applyRuntime(data.runtime);
          if (state.currentTemplate === "clock") {
            mainScreenEl.style.display = "";
          }
        } else {
          setAssignedScreenId(null);
          showProvisioning(data.pairingCode);
        }
        return;
      }
      if (data.type === "screen_runtime") {
        if (data.mediaToken) {
          setMediaToken(data.mediaToken);
        }
        if (!acceptedTargets.has(data.target)) {
          return;
        }
        applyRuntime(data.payload);
        return;
      }
      if (data.type === "screen_removed") {
        if (!acceptedTargets.has(data.target)) {
          return;
        }
        setAssignedScreenId(null);
        showProvisioning(data.payload?.pairingCode || "----");
        return;
      }
      if (data.type === "ha_state") {
        if (data.payload && data.payload.entityId) {
          state.haEntityState[data.payload.entityId] = data.payload;
          if (state.currentTemplate === "custom") {
            updateCustomDataCards(data.payload.entityId);
          } else if (state.currentTemplate === "map") {
            state.mapRuntime = renderMapRuntime(mapCanvasEl, state.mapRuntime, state.mapConfig, 24) || state.mapRuntime;
          }
        }
        return;
      }
      if (data.type === "ha_removed") {
        if (data.payload && data.payload.entityId) {
          delete state.haEntityState[data.payload.entityId];
          if (state.currentTemplate === "custom") {
            updateCustomDataCards(data.payload.entityId);
          } else if (state.currentTemplate === "map") {
            state.mapRuntime = renderMapRuntime(mapCanvasEl, state.mapRuntime, state.mapConfig, 24) || state.mapRuntime;
          }
        }
        return;
      }
      if (!acceptedTargets.has(data.target)) {
        return;
      }

      if (data.command === "theme") {
        const payload = data.payload || {};
        const mode = String(payload.mode || "dark").toLowerCase();
        if (mode === "light" || mode === "dark") {
          state.mode = mode;
        }
        if (payload.fontFamily !== undefined) {
          state.fontFamily = String(payload.fontFamily || "sans").toLowerCase();
        }
        if (payload.fontColor !== undefined) {
          state.fontColor = String(payload.fontColor || "").trim();
        }
        applyTheme();
      }

      if (data.command === "layout") {
        applyLayoutPayload(data.payload || {});
      }

      if (data.command === "overlay") {
        showOverlay(data.payload || {});
      }

      if (data.command === "ticker") {
        renderTicker(data.payload || {});
      }

      if (data.command === "weather") {
        const payload = data.payload || {};
        const tempRaw = payload.temp ?? payload.temperature;
        const condRaw = payload.condition ?? payload.summary;
        const humidity = payload.humidity;
        const wind = payload.wind;

        if (tempRaw !== undefined && tempRaw !== null && String(tempRaw).trim() !== "") {
          state.weatherTemp = `${tempRaw}${payload.unit || "°"}`;
        }
        const condBits = [];
        if (condRaw) {
          condBits.push(String(condRaw));
        }
        if (humidity !== undefined && humidity !== null && String(humidity).trim() !== "") {
          condBits.push(`RH ${humidity}%`);
        }
        if (wind !== undefined && wind !== null && String(wind).trim() !== "") {
          condBits.push(`Wind ${wind}`);
        }
        if (condBits.length > 0) {
          state.weatherCond = condBits.join(" | ");
        }
        renderFrameHud();
      }
      });
    }

    if (state.viewMode) {
      startViewRuntimePolling();
    } else {
      connectWs();
    }
  </script>
</body>
</html>
